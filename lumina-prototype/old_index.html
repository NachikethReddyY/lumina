<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina | Intelligent Support</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --colors-canvas: #141413;
            --colors-primary: #3b82f6;
            --colors-ink: #f7f8f8;
            --fonts-display: "EB Garamond", serif;
            --fonts-body: "Inter", sans-serif;
        }

        body {
            margin: 0;
            background: var(--colors-canvas);
            color: var(--colors-ink);
            font-family: var(--fonts-body);
            overflow-x: hidden;
        }

        nav {
            padding: 32px 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero {
            padding: 120px 64px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--fonts-display);
            font-size: 80px;
            line-height: 0.95;
            letter-spacing: -0.03em;
            margin-bottom: 32px;
        }

        p.lead {
            font-size: 20px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 48px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--colors-primary); color: #fff; }
        .btn-outline { border: 1px solid #333; color: #fff; }

        .logo-hero {
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <nav>
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 128 128" fill="none">
                <defs>
                    <linearGradient id="logo-grad" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#FFD700" />
                        <stop offset="50%" stop-color="#9370DB" />
                        <stop offset="100%" stop-color="#3b82f6" />
                    </linearGradient>
                </defs>
                <path d="M64 0C64 0 68 50 114 64C68 78 64 128 64 128C64 128 60 78 14 64C60 50 64 0 64 0Z" fill="url(#logo-grad)" />
            </svg>
            <span style="font-size: 20px; font-family: 'Inter', sans-serif;">Lumina</span>
        </div>
        <div style="display: flex; gap: 32px; font-size: 14px; color: #666;">
            <a href="submit.html" style="color: inherit; text-decoration: none;">Submit Ticket</a>
            <a href="admin.html" style="color: inherit; text-decoration: none;">Admin Portal</a>
        </div>
    </nav>

    <div class="hero">
        <div class="logo-hero">
            <svg width="96" height="96" viewBox="0 0 128 128" fill="none">
                <defs>
                    <linearGradient id="logo-grad-large" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#FFD700" />
                        <stop offset="50%" stop-color="#9370DB" />
                        <stop offset="100%" stop-color="#3b82f6" />
                    </linearGradient>
                </defs>
                <path d="M64 0C64 0 68 50 114 64C68 78 64 128 64 128C64 128 60 78 14 64C60 50 64 0 64 0Z" fill="url(#logo-grad-large)" />
            </svg>
        </div>
        <h1>Support at the <br/> speed of <span style="font-style: italic; color: #FFD700;">thought.</span></h1>
        <p class="lead">Lumina uses agentic AI to route support requests based on real-time admin workload and ticket complexity.</p>
        <div class="cta-group">
            <a href="submit.html" class="btn btn-primary">Start Request</a>
            <a href="admin.html" class="btn btn-outline">Admin Access</a>
        </div>
    </div>
</body>
</html>
