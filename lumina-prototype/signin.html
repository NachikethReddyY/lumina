<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0B0C0E; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 120%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        .serif { font-family: 'Playfair Display', serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
        }
        .logo-bright {
            filter: drop-shadow(0 0 8px rgba(255, 247, 0, 0.4));
        }
        input:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="text-gray-300 antialiased min-h-screen flex flex-col">

    <nav class="flex items-center justify-between px-8 py-8 max-w-7xl mx-auto w-full">
        <div class="flex items-center space-x-3">
            <div class="w-5 h-5 flex items-center justify-center logo-bright">
                <svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <defs>
                        <linearGradient id="logo-grad-signin" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#FFF700" />
                            <stop offset="50%" stop-color="#C084FC" />
                            <stop offset="100%" stop-color="#3B82F6" />
                        </linearGradient>
                    </defs>
                    <path d="M64 0Q64 64 128 64Q64 64 64 128Q64 64 0 64Q64 64 64 0Z" fill="url(#logo-grad-signin)" />
                </svg>
            </div>
            <a href="index.html" class="text-white font-medium tracking-tight no-underline" style="font-size: 20px; font-family: 'Inter', sans-serif;">Lumina</a>
        </div>
        <div class="flex items-center space-x-6 text-sm font-medium">
            <a href="index.html" class="text-gray-400 hover:text-white transition">Return Home</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="glass-card w-full max-w-[440px] p-12 rounded-2xl shadow-[0_0_80px_rgba(0,0,0,0.4)]">
            <header class="text-center mb-12">
                <div class="w-12 h-12 flex items-center justify-center mx-auto mb-8 logo-bright">
<svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full" width="20" height="20">
                        <path d="M64 0Q64 64 128 64Q64 64 64 128Q64 64 0 64Q64 64 64 0Z" fill="url(#logo-grad-signin)" />
                    </svg>
                </div>
                <h1 class="text-4xl text-white font-light serif italic mb-3">Welcome Back</h1>
                <p class="text-gray-500 text-sm font-light">Access the Lumina support terminal.</p>
            </header>

            <form class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold">Email Interface</label>
                    <input type="email" placeholder="admin@lumina.ai" 
                        class="w-full bg-black/40 border border-white/5 rounded-xl px-5 py-4 text-white placeholder-gray-700 focus:outline-none focus:border-blue-500/50 transition">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold">Secure Key</label>
                        <a href="#" class="text-[10px] text-blue-500 uppercase tracking-widest font-bold hover:text-blue-400 transition">Forgot?</a>
                    </div>
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-black/40 border border-white/5 rounded-xl px-5 py-4 text-white placeholder-gray-700 focus:outline-none focus:border-blue-500/50 transition">
                </div>

                <div class="flex items-center space-x-3 py-2">
                    <div class="w-4 h-4 rounded border border-white/10 bg-white/5 flex items-center justify-center cursor-pointer">
                        <div class="w-2 h-2 bg-blue-500 rounded-sm"></div>
                    </div>
                    <span class="text-xs text-gray-500 font-medium">Maintain session persistence</span>
                </div>

                <button type="button" class="w-full bg-[#3b82f6] hover:bg-blue-500 text-white py-4 rounded-xl font-bold transition shadow-xl shadow-blue-600/10 mt-4 active:scale-[0.98]">
                    Initialize Session
                </button>
            </form>

            <footer class="mt-12 pt-8 border-t border-white/5 text-center">
                <p class="text-xs text-gray-600">
                    New to the terminal? <a href="#" class="text-white hover:text-blue-400 transition font-semibold">Request Provisioning</a>
                </p>
            </footer>
        </div>
    </main>

    <footer class="py-12 text-center">
        <div class="flex items-center justify-center space-x-3 text-[10px] text-gray-600 font-bold tracking-[0.2em] uppercase">
            <div class="w-3 h-3 opacity-20">
                <svg viewBox="0 0 128 128" fill="none" class="w-full h-full">
                    <path d="M64 0Q64 64 128 64Q64 64 64 128Q64 64 0 64Q64 64 64 0Z" fill="currentColor" />
                </svg>
            </div>
            <span style="font-size: 20px; font-family: 'Inter', sans-serif;">Lumina Secure Authentication Protocol v2.0</span>
        </div>
    </footer>

</body>
</html>
