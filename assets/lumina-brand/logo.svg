<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ultra-Vibrant Gradient: Pure Gold to Sapphire Blue -->
    <linearGradient id="lumina-ultra-grad" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF700">
        <animate attributeName="stop-color" values="#FFF700;#FFFFFF;#FFF700" dur="2s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#C084FC" /> <!-- Vibrant Purple/Violet bridge -->
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Intense Glow Filter for "Fully Bright" appearance -->
    <filter id="lumina-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feFlood flood-color="#FFF700" flood-opacity="0.4" result="color" />
      <feComposite in="color" in2="blur1" operator="in" result="glow1" />
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sharp, Symmetric 4-pointed Sparkle (Perfect 1:1) -->
  <path d="M64 0Q64 64 128 64Q64 64 64 128Q64 64 0 64Q64 64 64 0Z" 
        fill="url(#lumina-ultra-grad)" 
        filter="url(#lumina-glow)" />
</svg>
